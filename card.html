<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wepink • Confirmação de Dados</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: #ffffff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: #1f2937;
    -webkit-font-smoothing: antialiased;
  }

  .page {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 18px 16px;
  }

  .brand {
    font-size: 28px;
    font-weight: 800;
    color: #ec0f6b;
    letter-spacing: -0.5px;
    margin: 0 0 18px;
  }

  .card {
    width: 100%;
    max-width: 430px;
    background: #ffffff;
    border: 1px solid #f1f1f4;
    border-radius: 18px;
    box-shadow: 0 10px 30px rgba(17, 24, 39, 0.06);
    padding: 24px 26px 22px;
  }

  .badge {
    display: inline-block;
    background: #fde7f0;
    color: #ec0f6b;
    font-size: 13px;
    font-weight: 700;
    padding: 6px 14px;
    border-radius: 999px;
    margin-bottom: 16px;
  }

  .title {
    font-size: 24px;
    font-weight: 800;
    color: #111827;
    margin-bottom: 8px;
  }

  .subtitle {
    font-size: 14.5px;
    color: #9aa0ad;
    margin-bottom: 18px;
  }

  .field { margin-bottom: 14px; }
  .field:last-of-type { margin-bottom: 4px; }

  .label {
    display: block;
    font-size: 13px;
    color: #b06a8c;
    margin-bottom: 7px;
  }

  .value {
    width: 100%;
    background: #f8f8fa;
    border: 1px solid #ececef;
    border-radius: 10px;
    padding: 14px 16px;
    font-size: 15.5px;
    font-weight: 600;
    color: #1f2937;
  }

  .footer {
    text-align: center;
    font-size: 12.5px;
    color: #b8bcc7;
    margin-top: 22px;
  }
</style>
</head>
<body>
  <div class="page">
    <div class="brand">Wepink</div>

    <div class="card">
      <span class="badge">Confirmação de Dados</span>
      <h1 class="title">Verifique suas informações</h1>
      <p class="subtitle">Confira se os dados abaixo estão corretos antes de continuar.</p>

      <div class="field">
        <label class="label">Nome Completo</label>
        <div class="value" id="nome">Carregando...</div>
      </div>

      <div class="field">
        <label class="label">CPF</label>
        <div class="value" id="cpf">Carregando...</div>
      </div>

      <div class="field">
        <label class="label">Data de Nascimento</label>
        <div class="value" id="datanascimento">Carregando...</div>
      </div>
    </div>

    <div class="footer">© 2026 Wepink • Ambiente Seguro</div>
  </div>

  <script>
    // ===== PEGA OS DADOS DA URL =====
    const urlParams = new URLSearchParams(window.location.search);
    const nome = urlParams.get('nome') || 'NÃO INFORMADO';
    const cpf = urlParams.get('cpf') || 'NÃO INFORMADO';
    const data = urlParams.get('data') || 'NÃO INFORMADO';

    // ===== FORMATA CPF (ex: 89244800144 → 892.448.001-44) =====
    function formatarCPF(cpf) {
      if (cpf.length === 11 && /^\d+$/.test(cpf)) {
        return cpf.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4');
      }
      return cpf;
    }

    // ===== COLOCA OS DADOS NA TELA =====
    document.getElementById('nome').textContent = nome;
    document.getElementById('cpf').textContent = formatarCPF(cpf);
    document.getElementById('datanascimento').textContent = data;
  </script>
</body>
</html>
